<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rook Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --felt:   #1a3d2b;
      --felt2:  #163325;
      --felt3:  #0f2419;
      --gold:   #c9a84c;
      --gold2:  #e8c96a;
      --cream:  #f5efe0;
      --red:    #c0392b;
      --yellow: #c8900a;
      --green:  #2a7a3a;
      --black:  #1a1a1a;
      --border: rgba(201,168,76,0.25);
      --shadow: 0 4px 24px rgba(0,0,0,0.6);
      --card-w: 88px;
      --card-h: 136px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--felt3);
      color: var(--cream);
    }

    /* ── LOBBY ──────────────────────────────────────────────── */
    #lobby {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 40% 50%, #1a3d2b, #0a1a10);
    }

    .lobby-card {
      background: rgba(10,25,16,0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 360px;
      box-shadow: var(--shadow);
    }

    .lobby-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: var(--gold);
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .lobby-sub {
      text-align: center;
      color: rgba(245,239,224,0.4);
      font-style: italic;
      margin-bottom: 2rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }

    .field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
    }

    .field input {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--gold); }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      border: none;
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .btn-gold {
      background: var(--gold);
      color: #0f1f14;
      font-weight: 700;
    }

    .btn-gold:hover:not(:disabled) { background: var(--gold2); }
    .btn-gold:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-gold-full { width: 100%; padding: 0.75rem; font-size: 1.05rem; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gold);
    }

    .btn-outline:hover:not(:disabled) { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .btn-outline:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── GAME TABLE ──────────────────────────────────────────── */
    #table {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at 50% 50%, #1e4a32 0%, #122a1c 60%, #0a1a10 100%);
    }

    #table.visible { display: block; }

    #table::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
        transparent 1px, transparent 8px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOP BAR ─────────────────────────────────────────────── */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .top-bar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    #phase-indicator {
      font-size: 0.82rem;
      color: rgba(245,239,224,0.45);
      font-style: italic;
    }

    #trump-display { display: flex; align-items: center; gap: 0.5rem; }
    .trump-label { color: rgba(245,239,224,0.4); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.7rem; }

    .trump-badge {
      padding: 0.15rem 0.65rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.82rem;
      font-family: 'Playfair Display', serif;
    }

    .trump-Red    { background: rgba(192,57,43,0.3);   color: #f08070; border: 1px solid rgba(192,57,43,0.5); }
    .trump-Yellow { background: rgba(200,144,10,0.3);  color: #f0c060; border: 1px solid rgba(200,144,10,0.5); }
    .trump-Green  { background: rgba(42,122,58,0.3);   color: #80d090; border: 1px solid rgba(42,122,58,0.5); }
    .trump-Black  { background: rgba(180,180,180,0.1); color: #d0d0d0; border: 1px solid rgba(180,180,180,0.3); }

    /* ── LAST TRICK PANEL ────────────────────────────────────── */
    #last-trick-panel {
      position: absolute;
      top: 56px;
      left: 12px;
      width: 300px;
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
      z-index: 5;
      display: none;
    }

    #last-trick-panel.visible { display: block; }

    .last-trick-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.45rem;
    }

    .last-trick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
    }

    .last-trick-slot {
      background: var(--cream);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 3px;
      gap: 2px;
      min-height: 80px;
    }

    .last-trick-slot.winner { border-color: rgba(158, 42, 204, 0.726); background: var(--cream); }
    .last-trick-slot.led    { border-style: dashed; }

    .lt-card-val {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.3rem;
      line-height: 1;
    }

    .lt-player { font-size: 0.9rem; color: rgb(0, 0, 0); }

    .lt-badges { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }

    .lt-badge {
      font-size: 0.8rem;
      padding: 0 3px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .lt-badge-led { background: rgba(7, 77, 189, 0.856); color: #a0c8ff; }
    .lt-badge-won { background: rgba(145, 108, 6, 0.897);  color: #f7d184; }

    /* ── UPCARD AREA ─────────────────────────────────────────── */

    .upcard-empty {
      width: 88px;
      height: 136px;
      border: 1px dashed rgba(201,168,76,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
    }

    /* ── PLAYER ZONES ─────────────────────────────────────────── */
    .player-zone {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 2;
    }

    .zone-top {
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
    }

    .zone-bottom {
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
    }

    .zone-left {
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      align-items: flex-start;
    }

    .zone-right {
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      align-items: flex-end;
    }

    .player-name-tag {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--cream);
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.18rem 0.75rem;
      white-space: nowrap;
    }

    .player-name-tag.me          { border-color: rgba(201,168,76,0.55); color: var(--gold); }
    .player-name-tag.active-turn { border-color: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.35); }

    /* .bid-display {
      font-size: 0.75rem;
      color: var(--gold);
      font-style: italic;
      text-align: center;
    } */

    .card-count-pip {
      font-size: 0rem;
      color: rgba(245,239,224,0.35);
      font-style: italic;
    }

    /* ── CENTER PLAY AREA ────────────────────────────────────── */
    #table-center {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 440px;
      height: 360px;
      z-index: 2;
    }

    .play-slot {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .play-slot-top    { top: 8px;   left: 50%; transform: translateX(-50%); }
    .play-slot-bottom { bottom: 8px; left: 50%; transform: translateX(-50%); }
    .play-slot-left   { left: 8px;  top: 50%; transform: translateY(-50%); }
    .play-slot-right  { right: 8px; top: 50%; transform: translateY(-50%); }

    .play-slot-label {
      height: 16px;          /* always takes up space even when empty */
      font-size: 1rem;
      color: rgba(245,239,224,0.4);
      font-style: normal;
      text-align: center;
      white-space: nowrap;
      margin-top: 4px;
    }

    .slot-placeholder {
      width: var(--card-w);
      height: var(--card-h);
      border: 4px dashed rgba(201,168,76,0.18);
      border-radius: 6px;
      background: rgba(255,255,255,0.018);
    }

    /* ── CARDS ───────────────────────────────────────────────── */
    .card {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: default;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .card.red    { color: var(--red); }
    .card.yellow { color: var(--yellow); }
    .card.green  { color: var(--green); }
    .card.black  { color: var(--black); }
    .card.rook   { color: #5a3a8a; background: #f0e8ff; }

    .card.selectable { cursor: pointer; }

    .card.selectable:hover:not(.selected) {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .card.selected {
      border-color: var(--gold);
      transform: translateY(-12px);
      box-shadow: 0 12px 24px rgba(201,168,76,0.45);
    }

    .card-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .card-suit {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.6;
    }

    /* ── MY HAND ─────────────────────────────────────────────── */
    #my-hand-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 16px 10px;
      background: rgba(0,0,0,0.28);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      z-index: 3;
    }

    /* ── ACTION PANEL ────────────────────────────────────────── */
    #action-panel {
      position: absolute;
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(5,18,10,0.88);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      z-index: 20;
      min-width: 260px;
    }

    #action-panel.hidden { display: none; }

    .action-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      color: var(--gold);
      text-align: center;
    }

    .action-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-row input[type=number] {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.38rem 0.6rem;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      width: 78px;
      outline: none;
    }

    .action-row select {
      background: rgba(5,18,10,0.97);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.38rem 0.6rem;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      outline: none;
    }

    .your-turn-pulse {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--gold);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── WAITING OVERLAY ─────────────────────────────────────── */
    #waiting-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      z-index: 30;
    }

    #waiting-overlay.hidden { display: none; }

    .waiting-box {
      background: rgba(8,20,12,0.97);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 400px;
      width: 90vw;
    }

    .waiting-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .waiting-sub {
      color: rgba(245,239,224,0.45);
      font-style: italic;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .player-list { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.5rem; }

    .player-list-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.85rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.92rem;
    }

    .player-list-item .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    /* ── NEST SWAP OVERLAY ───────────────────────────────────── */
    #nest-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      z-index: 25;
    }

    #nest-overlay.hidden { display: none; }

    .nest-box {
      background: rgba(8,20,12,0.97);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 2rem;
      max-width: 720px;
      width: 95vw;
      text-align: center;
    }

    .nest-box h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }

    .nest-instructions {
      font-style: italic;
      color: rgba(245,239,224,0.48);
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    #nest-hand-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1rem;
      padding: 0.5rem 0;
    }

    .nest-controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── SCORING OVERLAY ─────────────────────────────────────── */
    #scoring-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.78);
      z-index: 30;
    }

    #scoring-overlay.hidden { display: none; }

    .score-box {
      background: rgba(8,20,12,0.97);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 2.5rem;
      min-width: 340px;
      text-align: center;
    }

    .score-box h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .score-summary {
      font-style: italic;
      color: rgba(245,239,224,0.55);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .score-team {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 0.75rem;
    }

    .score-team-name {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .score-team-pts {
      font-size: 2rem;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.55rem 1.3rem;
      border-radius: 8px;
      font-size: 0.92rem;
      z-index: 9999;
      animation: toastIn 0.2s ease, toastOut 0.3s ease 2.7s forwards;
      white-space: nowrap;
    }

    .toast-info    { background: #1a3a5c; border: 1px solid #3a6a9c; color: #a8d4f8; }
    .toast-error   { background: #3a1a1a; border: 1px solid #8c3a3a; color: #f8a8a8; }
    .toast-success { background: #1a3a2a; border: 1px solid #3a7a5a; color: #a8f8c8; }

    @keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%)} }
    @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(10px)} }
  </style>
</head>
<body>

<!-- ══ LOBBY ══════════════════════════════════════════════════════ -->
<div id="lobby">
  <div class="lobby-card">
    <h1 class="lobby-title">🐦 Rook</h1>
    <p class="lobby-sub">Play with family, anywhere</p>
    <div class="field">
      <label for="input-username">Your Name</label>
      <input id="input-username" type="text" placeholder="e.g. Mia" maxlength="20" />
    </div>
    <div class="field">
      <label for="input-room">Room Code</label>
      <input id="input-room" type="text" placeholder="e.g. family2026" maxlength="20" />
    </div>
    <button class="btn btn-gold btn-gold-full" onclick="onJoinClick()">Join Room →</button>
  </div>
</div>

<!-- ══ GAME TABLE ══════════════════════════════════════════════════ -->
<div id="table">

  <!-- Top bar -->
  <div id="top-bar">
    <span class="top-bar-title">🐦 Rook</span>
    <div id="score-display" style="display:flex; gap:1rem; align-items:center; font-size:0.9rem;">
      <span style="color:rgba(245, 239, 224, 0.5); text-transform:uppercase; letter-spacing:0.08em; font-size:0.7rem;">Score</span>
      <span id="top-score-a" style="color:var(--gold);">—</span>
      <span style="color:rgba(245, 239, 224, 0.301);">|</span>
      <span id="top-score-b" style="color:var(--gold);">—</span>
    </div>
    <span id="phase-indicator">Waiting…</span>
    <div id="bid-info-display" style="display:flex; align-items:center; gap:0.5rem; font-size:0.9rem;">
      <span class="trump-label">Bid:</span>
      <span id="top-bid-amount" style="color:var(--gold); font-weight:700;"></span>
      <span id="top-bid-name" style="color:rgba(245, 239, 224, 0.699); font-style:italic;"></span>
    </div>
    <div id="trump-display">
      <span class="trump-label">Trump</span>
      <span id="trump-badge">—</span>
    </div>
  </div>

  <!-- Upcard display (only visible during bidding) -->

  <div id="upcard-area" style="display:none; position:absolute; top:58px; right:25px; z-index:5; display:flex; flex-direction:column; align-items:center; gap:6px;">
    <span style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:rgba(201, 168, 76, 0.911); font-family:'Playfair Display',serif;">Upcard</span>
    <div id="upcard-card"></div>
  </div>

  <!-- Last trick -->
  <div id="last-trick-panel">
    <div class="last-trick-title">Last Trick</div>
    <div class="last-trick-grid" id="last-trick-grid"></div>
  </div>

  <!-- Partner (top) -->
  <div class="player-zone zone-top">
    <div class="player-name-tag" id="name-top">—</div>
    <div class="bid-display"    id="bid-top"></div>
    <div class="card-count-pip" id="count-top"></div>
  </div>

  <!-- Left opponent -->
  <div class="player-zone zone-left">
    <div class="player-name-tag" id="name-left">—</div>
    <div class="bid-display"    id="bid-left"></div>
    <div class="card-count-pip" id="count-left"></div>
  </div>

  <!-- Right opponent -->
  <div class="player-zone zone-right">
    <div class="player-name-tag" id="name-right">—</div>
    <div class="bid-display"    id="bid-right"></div>
    <div class="card-count-pip" id="count-right"></div>
  </div>

  <!-- Me (bottom) -->
  <div class="player-zone zone-bottom">
    <div class="bid-display"    id="bid-bottom"></div>
    <div class="player-name-tag me" id="name-bottom">—</div>
  </div>

  <!-- Center play slots -->
  <div id="table-center">
    <div class="play-slot play-slot-top">
      <div class="slot-placeholder" id="slot-top"></div>
      <div class="play-slot-label"  id="slot-top-label"></div>
    </div>
    <div class="play-slot play-slot-left">
      <div class="slot-placeholder" id="slot-left"></div>
      <div class="play-slot-label"  id="slot-left-label"></div>
    </div>
    <div class="play-slot play-slot-right">
      <div class="slot-placeholder" id="slot-right"></div>
      <div class="play-slot-label"  id="slot-right-label"></div>
    </div>
    <div class="play-slot play-slot-bottom">
      <div class="slot-placeholder" id="slot-bottom"></div>
      <div class="play-slot-label"  id="slot-bottom-label"></div>
    </div>
  </div>

  <!-- My hand -->
  <div id="my-hand-area"></div>

  <!-- Action panel -->
  <div id="action-panel" class="hidden">
    <div class="action-title" id="action-title"></div>
    <div class="action-row"   id="action-row"></div>
  </div>

  <!-- Waiting overlay -->
  <div id="waiting-overlay">
    <div class="waiting-box">
      <div class="waiting-title">🐦 Rook Online</div>
      <p class="waiting-sub" id="waiting-sub">Waiting for players…</p>
      <div class="player-list" id="waiting-player-list"></div>
      <button id="btn-start" class="btn btn-gold btn-gold-full" onclick="onStartClick()" disabled>
        Need more players
      </button>
    </div>
  </div>

  <!-- Nest swap overlay -->
  <div id="nest-overlay" class="hidden">
    <div class="nest-box">
      <h2>Nest Swap</h2>
      <p class="nest-instructions" id="nest-instructions"></p>
      <div id="nest-hand-container"></div>
      <div class="nest-controls" id="nest-controls"></div>
    </div>
  </div>

  <!-- Scoring overlay -->
  <div id="scoring-overlay" class="hidden">
    <div class="score-box">
      <h2>Hand Results</h2>
      <p class="score-summary" id="score-summary-text"></p>
      <div class="score-grid">
        <div class="score-team">
          <div class="score-team-name" id="score-team-a-name">Team A</div>
          <div class="score-team-pts"  id="score-team-a-pts">0</div>
        </div>
        <div class="score-team">
          <div class="score-team-name" id="score-team-b-name">Team B</div>
          <div class="score-team-pts"  id="score-team-b-pts">0</div>
        </div>
      </div>
      <div id="nest-cards-area" style="margin-bottom:1.2rem;"></div>
      <button class="btn btn-gold btn-gold-full" onclick="onPlayAgainClick()">Play Again →</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/game.js"></script>
</body>
</html>
